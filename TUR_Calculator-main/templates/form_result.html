<!-- Kullanıcının verilerini çıktı olarak gösteren bir sayfa oluşturun -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../../static/css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__text">
        <h1>Formu doldurduğunuz için teşekkürler, {{name}}!</h1>
      </div>
    </header>
    <main>
      {% block content %}
      <h2>Bilgileriniz:</h2>
      <p>Email: {{email}}</p>
      <p>Adresiniz: {{address}}</p>
      {% endblock %}
    </main>
  </body>
</html>
